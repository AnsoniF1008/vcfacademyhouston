name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-hostinger-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy via FTP
    timeout-minutes: 30
    # Use Node.js 24 for JS-based actions before the platform default flip (Jun 2026).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to Hostinger via FTP (attempt 1)
        id: deploy_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          # Raíz FTP = public_html (Hostinger). Usar / evita /public_html/public_html/ en el servidor.
          server-dir: /
          # Default 30s is often too short from GitHub → Hostinger ("Timeout control socket").
          timeout: 180000
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/docs/**
            **/scripts/**
            **/sql/**
            **/backup/**
            **/export/**
            **/_import_*/**
            **/_redesign_*/**
            **/README.md
            **/*.zip
            **/.env
            **/.DS_Store
          dangerous-clean-slate: false

      - name: Wait before retry 2
        if: steps.deploy_1.outcome == 'failure'
        run: |
          echo "Attempt 1 failed. Hostinger sometimes throttles FTP after rapid"
          echo "successive logins; waiting 45s before retrying."
          sleep 45

      - name: Deploy to Hostinger via FTP (attempt 2)
        id: deploy_2
        if: steps.deploy_1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          # Raíz FTP = public_html (Hostinger). Usar / evita /public_html/public_html/ en el servidor.
          server-dir: /
          timeout: 180000
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/docs/**
            **/scripts/**
            **/sql/**
            **/backup/**
            **/export/**
            **/_import_*/**
            **/_redesign_*/**
            **/README.md
            **/*.zip
            **/.env
            **/.DS_Store
          dangerous-clean-slate: false

      - name: Wait before retry 3
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        run: |
          echo "Attempt 2 also failed. Backing off 90s before final attempt."
          sleep 90

      - name: Deploy to Hostinger via FTP (attempt 3)
        id: deploy_3
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          # Raíz FTP = public_html (Hostinger). Usar / evita /public_html/public_html/ en el servidor.
          server-dir: /
          timeout: 180000
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/.cursor/**
            **/docs/**
            **/scripts/**
            **/sql/**
            **/backup/**
            **/export/**
            **/_import_*/**
            **/_redesign_*/**
            **/README.md
            **/*.zip
            **/.env
            **/.DS_Store
          dangerous-clean-slate: false

      - name: Fail workflow if all retries fail
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure' && steps.deploy_3.outcome == 'failure'
        run: |
          echo "All FTP deploy attempts failed."
          exit 1
